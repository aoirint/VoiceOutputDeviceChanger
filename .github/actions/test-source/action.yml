name: Test source and package contract
description: Build the plugin and run deterministic audio and archive-contract tests.

runs:
  using: composite
  steps:
    - name: Set up locked .NET environment
      uses: ./.github/actions/setup-dotnet

    - name: Read project version
      id: project-version
      shell: bash
      run: |
        set -euo pipefail
        project_version=$(dotnet msbuild \
          VoiceOutputDeviceChanger/VoiceOutputDeviceChanger.csproj \
          -getProperty:Version -nologo | tr -d '\r' | xargs)
        echo "version=${project_version}" >> "${GITHUB_OUTPUT}"

    - name: Build release configuration
      shell: bash
      run: |
        set -euo pipefail
        dotnet_build_args=(--no-restore --configuration Release)
        if [[ "${{ steps.project-version.outputs.version }}" == *"-"* ]]; then
          # BepInEx 5 parses plugin metadata as System.Version and rejects
          # SemVer prerelease labels. Keep the release identity in Version.
          dotnet_build_args+=(-p:BepInExPluginVersion=0.0.0)
        fi
        dotnet build VoiceOutputDeviceChanger.slnx "${dotnet_build_args[@]}"

    - name: Run deterministic audio and package-contract tests
      shell: bash
      run: |
        set -euo pipefail
        dotnet run \
          --project VoiceOutputDeviceChanger.Tests \
          --no-build --configuration Release -- \
          VoiceOutputDeviceChanger/bin/Release/netstandard2.1/VoiceOutputDeviceChanger.dll \
          "${{ steps.project-version.outputs.version }}" \
          "${{ steps.project-version.outputs.version }}" \
          --skip-live-audio
