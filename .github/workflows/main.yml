name: Main

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  lint:
    # Revalidate the exact integrated commit before any artifact can be built.
    runs-on: ubuntu-slim
    timeout-minutes: 10

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run shared source gate
        uses: ./.github/actions/lint-source

  test:
    # Smoke-test the Windows-targeted executable on the oldest supported
    # Windows image; hosted runners skip the hardware-dependent audio probe.
    runs-on: windows-2022

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run shared test and package gate
        uses: ./.github/actions/test-source

  plan:
    # Planning resolves release state but cannot mutate source or GitHub.
    runs-on: ubuntu-slim
    timeout-minutes: 5

    outputs:
      release_mode: ${{ steps.generate-version.outputs.release_mode }}
      project_version: ${{ steps.project-version.outputs.version }}
      artifact_version: ${{ steps.generate-version.outputs.app_version }}
      tag: ${{ steps.generate-version.outputs.git_version }}
      archive_name: ${{ steps.package-name.outputs.archive_name }}

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read project version
        id: project-version
        run: |
          set -euo pipefail
          project_version=$(sed -n \
            '/APP_VERSION_MARKER/{n; s|<Version>\(.*\)</Version>|\1|; p;}' \
            VoiceOutputDeviceChanger/VoiceOutputDeviceChanger.csproj | tr -d '\r' | xargs)
          if [[ ! "${project_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Project Version must be a three-part numeric version." >&2
            exit 1
          fi
          echo "version=${project_version}" >> "${GITHUB_OUTPUT}"

      - name: Generate version plan
        id: generate-version
        uses: ./.github/actions/generate-version
        with:
          csproj_file: "VoiceOutputDeviceChanger/VoiceOutputDeviceChanger.csproj"
          write_files: false

      - name: Validate release plan
        run: |
          set -euo pipefail
          if [[ "${{ steps.generate-version.outputs.release_mode }}" == "latest" ]]; then
            grep -Fq "## [${{ steps.project-version.outputs.version }}]" CHANGELOG.md
          fi

      - name: Resolve package name
        id: package-name
        run: >-
          echo "archive_name=VoiceOutputDeviceChanger-v${{
          steps.generate-version.outputs.app_version }}.zip" >> "${GITHUB_OUTPUT}"

  build:
    needs:
      - lint
      - test
      - plan
    # Build keeps ubuntu-latest because packaging currently relies on
    # runner-provided shell tools such as jq and 7z.
    runs-on: ubuntu-latest

    outputs:
      archive_name: ${{ needs.plan.outputs.archive_name }}

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up locked .NET environment
        uses: ./.github/actions/setup-dotnet

      - name: Build release configuration
        run: dotnet build VoiceOutputDeviceChanger.slnx --no-restore --configuration Release

      - name: Create artifact
        run: |
          TMP_ARTIFACT_DIR=./tmp_artifacts
          ARTIFACT_STEM=VoiceOutputDeviceChanger-v${{ needs.plan.outputs.artifact_version }}

          mkdir -p "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}"

          # Keep this layout as the Thunderstore package root; consumers expect
          # the DLL, manifest, icon, docs, changelog, and license at zip root.
          # https://thunderstore.io/c/lethal-company/create/docs/

          # Keep the build output for the archive-contract validator below.
          cp \
            ./VoiceOutputDeviceChanger/bin/Release/netstandard2.1/VoiceOutputDeviceChanger.dll \
            "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/"

          jq \
            --arg version "${{ needs.plan.outputs.project_version }}" \
            '.version_number = $version' \
            ./assets/manifest.json \
            > "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/manifest.json"
          cp ./assets/icon.png "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/"
          cp ./assets/README.md "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/"
          cp ./assets/CHANGELOG.md "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/"
          cp ./LICENSE "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/"

          cd "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}"
          7z a -r "../${ARTIFACT_STEM}.zip" .

          cd ..
          rm -rf "${ARTIFACT_STEM:?}/"
          sha256sum "${ARTIFACT_STEM}.zip" > SHA256SUMS

      - name: Validate completed package
        run: |
          dotnet run \
            --project VoiceOutputDeviceChanger.Tests \
            --no-build --configuration Release -- \
            VoiceOutputDeviceChanger/bin/Release/netstandard2.1/VoiceOutputDeviceChanger.dll \
            "${{ needs.plan.outputs.project_version }}" \
            "${{ needs.plan.outputs.artifact_version }}" \
            "tmp_artifacts/${{ needs.plan.outputs.archive_name }}" \
            --skip-live-audio

      - name: Verify package checksum
        run: cd ./tmp_artifacts && sha256sum --check SHA256SUMS

      - name: Upload validated package
        id: upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact
          path: ./tmp_artifacts/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Record artifact provenance
        run: |
          {
            echo "| Metric | Value |"
            echo "| :----- | :---- |"
            echo "| Commit | [${GITHUB_SHA:0:7}](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) |"
            echo "| Release mode | ${{ needs.plan.outputs.release_mode }} |"
            echo "| Project version | ${{ needs.plan.outputs.project_version }} |"
            echo "| Artifact version | ${{ needs.plan.outputs.artifact_version }} |"
            echo "| Artifact | [Download](${{ steps.upload-artifact.outputs.artifact-url }}) |"
            echo "| Artifact digest | \`${{ steps.upload-artifact.outputs.artifact-digest }}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  release:
    needs:
      - build
      - plan
    # Keep stable publication ready without treating a version change as
    # publication authorization.
    if: false && needs.plan.outputs.release_mode == 'latest'
    # Publication is a lightweight artifact and API operation with no native
    # compatibility contract or full-VM requirement.
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download validated package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: artifact
          path: ./tmp_artifacts

      - name: Verify downloaded artifact
        run: |
          set -euo pipefail
          mapfile -t archives < <(find ./tmp_artifacts -maxdepth 1 -type f -name '*.zip' -print)
          mapfile -t checksums < <(find ./tmp_artifacts -maxdepth 1 -type f -name 'SHA256SUMS' -print)
          [[ ${#archives[@]} -eq 1 ]]
          [[ ${#checksums[@]} -eq 1 ]]
          [[ "$(basename "${archives[0]}")" == "${{ needs.build.outputs.archive_name }}" ]]
          (cd ./tmp_artifacts && sha256sum --check SHA256SUMS)

      - name: Publish release
        # Create immutable releases so an already-published version cannot be
        # silently replaced by a later workflow run for the same tag.
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ needs.plan.outputs.tag }}
          commit: ${{ github.sha }}
          immutableCreate: true
          prerelease: false
          makeLatest: true
          generateReleaseNotes: true
          artifacts: ./tmp_artifacts/*.zip
          artifactErrorsFailBuild: true
          artifactContentType: application/zip

      - name: Publish stable release to Thunderstore
        uses: ./.github/actions/publish-thunderstore
        with:
          artifact_path: ./tmp_artifacts/${{ needs.plan.outputs.archive_name }}
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          namespace: aoirint
          community: lethal-company
          community_categories: |
            mods
            tweaks-and-quality-of-life
            ai-generated
