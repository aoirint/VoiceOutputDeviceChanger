name: Main

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  lint:
    # Revalidate the exact integrated commit before any artifact can be built.
    runs-on: ubuntu-slim

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run shared source gate
        uses: ./.github/actions/lint-source

  test:
    # Hosted Linux cannot exercise the Windows Core Audio interop boundary.
    runs-on: windows-2025

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run shared test and package gate
        uses: ./.github/actions/test-source

  plan:
    # Planning resolves release state but cannot mutate source or GitHub.
    runs-on: ubuntu-slim

    outputs:
      release_mode: ${{ steps.generate-version.outputs.release_mode }}
      project_version: ${{ steps.project-version.outputs.version }}
      artifact_version: ${{ steps.generate-version.outputs.app_version }}
      tag: ${{ steps.generate-version.outputs.git_version }}
      archive_name: ${{ steps.package-name.outputs.archive_name }}

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read project version
        id: project-version
        run: |
          set -euo pipefail
          project_version=$(sed -n \
            '/APP_VERSION_MARKER/{n; s|<Version>\(.*\)</Version>|\1|; p;}' \
            VoiceOutputDeviceChanger/VoiceOutputDeviceChanger.csproj | tr -d '\r' | xargs)
          if [[ ! "${project_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Project Version must be a three-part numeric version." >&2
            exit 1
          fi
          echo "version=${project_version}" >> "${GITHUB_OUTPUT}"

      - name: Generate version plan
        id: generate-version
        uses: ./.github/actions/generate-version
        with:
          csproj_file: "VoiceOutputDeviceChanger/VoiceOutputDeviceChanger.csproj"
          write_files: false

      - name: Validate release plan
        run: |
          set -euo pipefail
          if [[ "${{ steps.generate-version.outputs.release_mode }}" == "latest" ]]; then
            grep -Fq "## [${{ steps.project-version.outputs.version }}]" CHANGELOG.md
          fi

      - name: Resolve package name
        id: package-name
        run: >-
          echo "archive_name=VoiceOutputDeviceChanger-v${{
          steps.generate-version.outputs.app_version }}.zip" >> "${GITHUB_OUTPUT}"

  build:
    needs:
      - lint
      - test
      - plan
    runs-on: windows-2025

    outputs:
      artifact_name: package-${{ needs.plan.outputs.artifact_version }}
      archive_name: ${{ needs.plan.outputs.archive_name }}

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up locked .NET environment
        uses: ./.github/actions/setup-dotnet

      - name: Build release configuration
        run: dotnet build VoiceOutputDeviceChanger.slnx --no-restore --configuration Release

      - name: Create deterministic package
        shell: pwsh
        run: |
          $plugin = (Resolve-Path `
            "VoiceOutputDeviceChanger/bin/Release/netstandard2.1/VoiceOutputDeviceChanger.dll").Path
          $packageDirectory = [IO.Path]::GetFullPath("artifacts")
          [IO.Directory]::CreateDirectory($packageDirectory) | Out-Null
          $archiveName = "${{ needs.plan.outputs.archive_name }}"
          $package = Join-Path $packageDirectory $archiveName
          $reproduction = Join-Path $env:RUNNER_TEMP $archiveName

          function New-VoiceOutputDeviceChangerPackage([string] $output) {
            $staging = Join-Path $env:RUNNER_TEMP `
              "voice-output-package-$([Guid]::NewGuid().ToString('N'))"
            [IO.Directory]::CreateDirectory($staging) | Out-Null
            try {
              $inputs = [ordered]@{
                "VoiceOutputDeviceChanger.dll" = $plugin
                "manifest.json" = [IO.Path]::GetFullPath("assets/manifest.json")
                "icon.png" = [IO.Path]::GetFullPath("assets/icon.png")
                "README.md" = [IO.Path]::GetFullPath("assets/README.md")
                "CHANGELOG.md" = [IO.Path]::GetFullPath("assets/CHANGELOG.md")
                "LICENSE" = [IO.Path]::GetFullPath("LICENSE")
              }
              foreach ($entry in $inputs.GetEnumerator()) {
                $destination = Join-Path $staging $entry.Key
                [IO.File]::Copy($entry.Value, $destination)
                [IO.File]::SetLastWriteTimeUtc(
                  $destination,
                  [DateTime]::new(1980, 1, 1, 0, 0, 0, [DateTimeKind]::Utc)
                )
              }
              $manifestPath = Join-Path $staging "manifest.json"
              $manifest = [IO.File]::ReadAllText($manifestPath) | ConvertFrom-Json
              $manifest.version_number = "${{ needs.plan.outputs.project_version }}"
              $manifestJson = $manifest | ConvertTo-Json -Depth 10
              [IO.File]::WriteAllText(
                $manifestPath,
                "$manifestJson`n",
                [Text.UTF8Encoding]::new($false)
              )
              [IO.File]::SetLastWriteTimeUtc(
                $manifestPath,
                [DateTime]::new(1980, 1, 1, 0, 0, 0, [DateTimeKind]::Utc)
              )
              if ([IO.File]::Exists($output)) {
                [IO.File]::Delete($output)
              }
              [IO.Compression.ZipFile]::CreateFromDirectory(
                $staging,
                $output,
                [IO.Compression.CompressionLevel]::Optimal,
                $false
              )
            } finally {
              [IO.Directory]::Delete($staging, $true)
            }
          }

          New-VoiceOutputDeviceChangerPackage $package
          New-VoiceOutputDeviceChangerPackage $reproduction
          $hash = (Get-FileHash -Algorithm SHA256 $package).Hash.ToLowerInvariant()
          $reproductionHash = (Get-FileHash `
            -Algorithm SHA256 $reproduction).Hash.ToLowerInvariant()
          if ($hash -ne $reproductionHash) {
            throw "Repeated package creation produced different bytes."
          }
          [IO.File]::WriteAllText(
            "$package.sha256",
            "$hash  $archiveName`n",
            [Text.ASCIIEncoding]::new()
          )

      - name: Validate completed package
        shell: pwsh
        run: |
          dotnet run `
            --project VoiceOutputDeviceChanger.Tests `
            --no-build --configuration Release -- `
            VoiceOutputDeviceChanger/bin/Release/netstandard2.1/VoiceOutputDeviceChanger.dll `
            "${{ needs.plan.outputs.project_version }}" `
            "${{ needs.plan.outputs.artifact_version }}" `
            "artifacts/${{ needs.plan.outputs.archive_name }}" `
            --skip-live-audio

      - name: Verify package checksum
        run: cd artifacts && sha256sum --check ./*.sha256

      - name: Upload validated package
        id: upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-${{ needs.plan.outputs.artifact_version }}
          path: |
            artifacts/${{ needs.plan.outputs.archive_name }}
            artifacts/${{ needs.plan.outputs.archive_name }}.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Record artifact provenance
        run: |
          {
            echo "| Metric | Value |"
            echo "| :----- | :---- |"
            echo "| Commit | [${GITHUB_SHA:0:7}](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) |"
            echo "| Release mode | ${{ needs.plan.outputs.release_mode }} |"
            echo "| Project version | ${{ needs.plan.outputs.project_version }} |"
            echo "| Artifact version | ${{ needs.plan.outputs.artifact_version }} |"
            echo "| Artifact | [Download](${{ steps.upload-artifact.outputs.artifact-url }}) |"
            echo "| Artifact digest | \`${{ steps.upload-artifact.outputs.artifact-digest }}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  release:
    needs:
      - build
      - plan
    # Keep stable publication ready without treating a version change as
    # publication authorization.
    if: false && needs.plan.outputs.release_mode == 'latest'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out integrated source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download validated package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: artifacts

      - name: Verify downloaded artifact
        run: |
          set -euo pipefail
          mapfile -t archives < <(find artifacts -maxdepth 1 -type f -name '*.zip' -print)
          mapfile -t checksums < <(find artifacts -maxdepth 1 -type f -name '*.zip.sha256' -print)
          [[ ${#archives[@]} -eq 1 ]]
          [[ ${#checksums[@]} -eq 1 ]]
          [[ "$(basename "${archives[0]}")" == "${{ needs.build.outputs.archive_name }}" ]]
          (cd artifacts && sha256sum --check "$(basename "${checksums[0]}")")

      - name: Resolve release state
        id: release-state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
        run: |
          set -euo pipefail
          tag_exists=false
          release_exists=false
          if tag_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" 2>/dev/null); then
            tag_exists=true
          fi
          if release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" 2>/dev/null); then
            release_exists=true
          fi

          if [[ "${tag_exists}" == false && "${release_exists}" == false ]]; then
            echo "reuse=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "${tag_exists}" != "${release_exists}" ]]; then
            echo "Release identity is incomplete for ${RELEASE_TAG}." >&2
            exit 1
          fi

          expected_digest="sha256:$(cut -d ' ' -f 1 "artifacts/${ARCHIVE_NAME}.sha256")"
          [[ "$(jq -r '.object.type' <<< "${tag_json}")" == "commit" ]]
          [[ "$(jq -r '.object.sha' <<< "${tag_json}")" == "${GITHUB_SHA}" ]]
          [[ "$(jq -r '.tag_name' <<< "${release_json}")" == "${RELEASE_TAG}" ]]
          [[ "$(jq -r '.target_commitish' <<< "${release_json}")" == "${GITHUB_SHA}" ]]
          [[ "$(jq -r '.draft' <<< "${release_json}")" == "false" ]]
          [[ "$(jq -r '.prerelease' <<< "${release_json}")" == "false" ]]
          [[ "$(jq -r '.immutable' <<< "${release_json}")" == "true" ]]
          [[ "$(jq '.assets | length' <<< "${release_json}")" -eq 1 ]]
          [[ "$(jq -r --arg name "${ARCHIVE_NAME}" '.assets[] | select(.name == $name) | .digest' <<< "${release_json}")" == "${expected_digest}" ]]
          release_id=$(jq -r '.id' <<< "${release_json}")
          if [[ ! "${release_id}" =~ ^[0-9]+$ ]]; then
            echo "Existing release has an invalid ID." >&2
            exit 1
          fi
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"
          echo "reuse=true" >> "${GITHUB_OUTPUT}"

      - name: Create draft release
        id: create-release
        if: steps.release-state.outputs.reuse != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          release_id=$(gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="${RELEASE_TAG}" \
            -f target_commitish="${GITHUB_SHA}" \
            -f name="${RELEASE_TAG}" \
            -F draft=true \
            -F prerelease=false \
            -F generate_release_notes=true \
            --jq '.id')
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

      - name: Attach release assets
        if: steps.release-state.outputs.reuse != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: gh release upload "${RELEASE_TAG}" artifacts/*.zip

      - name: Publish immutable release
        if: steps.release-state.outputs.reuse != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.create-release.outputs.release_id }}
        run: >-
          gh api --method PATCH
          "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
          -F draft=false -F prerelease=false -f make_latest=true

      - name: Verify published release record
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
        run: |
          set -euo pipefail
          expected_digest="sha256:$(cut -d ' ' -f 1 "artifacts/${ARCHIVE_NAME}.sha256")"
          release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")
          [[ "$(jq -r '.tag_name' <<< "${release_json}")" == "${RELEASE_TAG}" ]]
          [[ "$(jq -r '.target_commitish' <<< "${release_json}")" == "${GITHUB_SHA}" ]]
          [[ "$(jq -r '.draft' <<< "${release_json}")" == "false" ]]
          [[ "$(jq -r '.prerelease' <<< "${release_json}")" == "false" ]]
          [[ "$(jq -r '.immutable' <<< "${release_json}")" == "true" ]]
          [[ "$(jq '.assets | length' <<< "${release_json}")" -eq 1 ]]
          [[ "$(jq -r --arg name "${ARCHIVE_NAME}" '.assets[] | select(.name == $name) | .digest' <<< "${release_json}")" == "${expected_digest}" ]]

      - name: Publish stable release to Thunderstore
        uses: ./.github/actions/publish-thunderstore
        with:
          artifact_path: artifacts/${{ needs.plan.outputs.archive_name }}
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          namespace: aoirint
          community: lethal-company
          community_categories: |
            mods
            tweaks-and-quality-of-life
            ai-generated
